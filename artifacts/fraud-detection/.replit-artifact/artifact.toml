kind = "web"
previewPath = "/"
title = "Financial Fraud Detection"
version = "1.0.0"
id = "artifacts/fraud-detection"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23665

[services.development]
run = "pnpm --filter @workspace/fraud-detection run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fraud-detection", "run", "build" ]
publicDir = "artifacts/fraud-detection/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23665"
BASE_PATH = "/"
